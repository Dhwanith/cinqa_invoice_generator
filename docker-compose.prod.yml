services:
  operator-app:
    build:
      context: .
      dockerfile: Dockerfile.pdf-service
    container_name: cinqa-operator-app
    env_file:
      - .env
    environment:
      APP_PORT: 8010
    ports:
      - "127.0.0.1:8010:8010"
    command: ["npm", "run", "app:server"]
    restart: unless-stopped

  pdf-service:
    build:
      context: .
      dockerfile: Dockerfile.pdf-service
    container_name: cinqa-pdf-service
    env_file:
      - .env
    environment:
      PDF_SERVICE_PORT: 8001
    ports:
      - "127.0.0.1:8001:8001"
    command: ["npm", "run", "pdf:service"]
    restart: unless-stopped